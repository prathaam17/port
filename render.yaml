services:
  - type: web
    name: nmpa-port-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: DATABASE_URL
        sync: false # Set this manually in Render Dashboard using Postgres connection string
      - key: JWT_SECRET
        generateValue: true
      - key: DB_DIALECT
        value: postgres
