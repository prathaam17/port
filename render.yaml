services:
  - type: web
    name: port-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: port-db
          property: connectionString
      - key: DB_DIALECT
        value: postgres
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: port-db
    plan: free
